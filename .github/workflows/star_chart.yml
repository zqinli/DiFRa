name: Generate Star History Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/star_chart.yml"
      - ".github/gen_star_chart.py"
  schedule:
    # Daily at 00:20 UTC. Change to "20 0 * * 0" for weekly Sunday runs.
    - cron: "20 0 * * *"

permissions:
  contents: write

concurrency:
  group: star-history-chart
  cancel-in-progress: false

jobs:
  generate-star-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib

      - name: Generate star data and charts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/gen_star_chart.py

      - name: Commit updated star history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add star_data.csv assets/star_history_light.png assets/star_history_dark.png

          if git diff --cached --quiet; then
            echo "No new star history changes. Skipping commit."
          else
            git commit -m "chore: update star history chart"
            git push
          fi
